name = "LispBM"
grammar = "lispbm"
path_suffixes = ["lisp", "lbm"]
line_comments = ["; ", ";; ", ";;; ", ";;;; "]
brackets = [
    { start = "[", end = "]", close = true, newline = false },
    { start = "(", end = ")", close = true, newline = false },
    { start = "{", end = "}", close = true, newline = false },
    { start = "\"", end = "\"", close = true, newline = false, not_in = ["fragment"] },
]
word_characters = ["-"]
